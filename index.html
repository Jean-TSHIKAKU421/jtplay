<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JTPlay - Connexion</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    
    <div class="auth-wrapper">
        <!-- Décorations -->
        <div class="auth-decoration">
            <div class="decoration-circle circle-1"></div>
            <div class="decoration-circle circle-2"></div>
            <div class="decoration-circle circle-3"></div>
        </div>

        <div class="auth-container">
            <!-- Logo -->
            <div class="auth-logo">
                <div class="logo-icon">
                    <i class="fas fa-film"></i>
                </div>
                <h1>JTPlay</h1>
                <!-- <p>Votre collection de films</p> -->
            </div>

            <!-- Carte d'authentification -->
            <div class="auth-card">
                <!-- Tabs -->
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">
                        <i class="fas fa-sign-in-alt"></i> Connexion
                    </button>
                    <button class="auth-tab" data-tab="register">
                        <i class="fas fa-user-plus"></i> Inscription
                    </button>
                </div>

                <!-- Formulaire Connexion -->
                <form id="loginForm" class="auth-form active">
                    <div class="form-header">
                        <h2>Content de vous revoir</h2>
                        <p>Connectez-vous pour continuer</p>
                    </div>
                    
                    <div class="input-group">
                        <label>Adresse email</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="loginEmail" placeholder="exemple@email.com" required>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label>Mot de passe</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="loginPassword" placeholder="••••••••" required>
                            <button type="button" class="toggle-password" data-target="loginPassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div id="loginError" class="alert alert-error"></div>
                    
                    <button type="submit" class="btn btn-primary btn-full">
                        <span>Se connecter</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                    
                    <p class="form-footer">
                        Pas encore de compte ? 
                        <a href="#" class="switch-tab" data-tab="register">S'inscrire</a>
                    </p>
                </form>

                <!-- Formulaire Inscription -->
                <form id="registerForm" class="auth-form">
                    <div class="form-header">
                        <h2>Créer un compte</h2>
                        <p>Rejoignez notre communauté</p>
                    </div>
                    
                    <div class="input-group">
                        <label>Nom complet</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" id="regName" placeholder="Jean Dupont" required>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label>Adresse email</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="regEmail" placeholder="exemple@email.com" required>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label>Mot de passe</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="regPassword" placeholder="6 caractères minimum" minlength="6" required>
                            <button type="button" class="toggle-password" data-target="regPassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div id="registerError" class="alert alert-error"></div>
                    <div id="registerSuccess" class="alert alert-success"></div>
                    
                    <button type="submit" class="btn btn-primary btn-full">
                        <span>Créer mon compte</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                    
                    <p class="form-footer">
                        Déjà un compte ? 
                        <a href="#" class="switch-tab" data-tab="login">Se connecter</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/theme.js"></script>
</body>
</html>
