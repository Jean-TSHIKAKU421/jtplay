<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JTPlay - Téléchargements</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    
    <header class="header">
        <div class="header-container">
            <a href="home.html" class="logo">
                <i class="fas fa-film"></i>
                <span>JTPlay</span>
            </a>
            <div class="header-actions">
                <button class="theme-toggle" onclick="toggleTheme()">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
                <button class="btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="downloads-page">
            <div class="page-header">
                <h1><i class="fas fa-download"></i> Mes Téléchargements</h1>
                <p>Gérez vos films téléchargés</p>
            </div>

            <div class="downloads-stats">
                <div class="stat-card">
                    <i class="fas fa-film"></i>
                    <div>
                        <span class="stat-number">3</span>
                        <span class="stat-label">Films</span>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-hard-drive"></i>
                    <div>
                        <span class="stat-number">6.8</span>
                        <span class="stat-label">Go utilisés</span>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-wifi"></i>
                    <div>
                        <span class="stat-number">12.4</span>
                        <span class="stat-label">Go disponibles</span>
                    </div>
                </div>
            </div>

            <div class="downloads-list" id="downloadsList">
                <div class="download-item downloading">
                    <div class="download-poster">
                        <img src="https://image.tmdb.org/t/p/w200/1pdfLvkbY9ohJlCjQH2CZjjYVvJ.jpg" alt="Dune">
                        <div class="download-overlay">
                            <i class="fas fa-spinner fa-spin"></i>
                        </div>
                    </div>
                    <div class="download-info">
                        <h3>Dune: Part Two</h3>
                        <div class="download-meta">
                            <span>2024</span>
                            <span>•</span>
                            <span>2h46</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: 67%"></div>
                        </div>
                        <div class="download-details">
                            <span>1.2 Go / 1.8 Go</span>
                            <span>•</span>
                            <span>67%</span>
                        </div>
                    </div>
                    <div class="download-actions">
                        <button class="btn-icon" title="Pause"><i class="fas fa-pause"></i></button>
                        <button class="btn-icon" title="Annuler"><i class="fas fa-times"></i></button>
                    </div>
                </div>

                <div class="download-item completed">
                    <div class="download-poster">
                        <img src="https://image.tmdb.org/t/p/w200/8Gxv8gSFCU0XGDykEGv7zR1n2ua.jpg" alt="Oppenheimer">
                        <div class="download-overlay">
                            <i class="fas fa-check-circle"></i>
                        </div>
                    </div>
                    <div class="download-info">
                        <h3>Oppenheimer</h3>
                        <div class="download-meta">
                            <span>2023</span>
                            <span>•</span>
                            <span>3h00</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: 100%"></div>
                        </div>
                        <div class="download-details">
                            <span>2.4 Go</span>
                            <span>•</span>
                            <span class="completed-text">Terminé</span>
                        </div>
                    </div>
                    <div class="download-actions">
                        <button class="btn-icon" title="Supprimer"><i class="fas fa-trash"></i></button>
                    </div>
                </div>

                <div class="download-item queued">
                    <div class="download-poster">
                        <img src="https://image.tmdb.org/t/p/w200/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg" alt="Interstellar">
                        <div class="download-overlay">
                            <i class="fas fa-clock"></i>
                        </div>
                    </div>
                    <div class="download-info">
                        <h3>Interstellar</h3>
                        <div class="download-meta">
                            <span>2014</span>
                            <span>•</span>
                            <span>2h49</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: 0%"></div>
                        </div>
                        <div class="download-details">
                            <span>3.1 Go</span>
                            <span>•</span>
                            <span class="queued-text">En attente</span>
                        </div>
                    </div>
                    <div class="download-actions">
                        <button class="btn-icon" title="Démarrer"><i class="fas fa-play"></i></button>
                        <button class="btn-icon" title="Annuler"><i class="fas fa-times"></i></button>
                    </div>
                </div>
            </div>

            <button class="btn-clear">
                <i class="fas fa-broom"></i> Effacer les téléchargements terminés
            </button>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Accueil</span>
        </a>
        <a href="downloads.html" class="nav-item active">
            <i class="fas fa-download"></i>
            <span>Downloads</span>
        </a>
        <a href="settings.html" class="nav-item">
            <i class="fas fa-cog"></i>
            <span>Paramètres</span>
        </a>
        <a href="about.html" class="nav-item">
            <i class="fas fa-info-circle"></i>
            <span>À propos</span>
        </a>
    </nav>

    <script src="js/auth.js"></script>
    <script src="js/downloads.js"></script>
    <script src="js/theme.js"></script>
</body>
</html>
